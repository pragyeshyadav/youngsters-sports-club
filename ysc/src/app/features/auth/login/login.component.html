<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <app-club-logo size="lg" />
      <div class="brand-title-banner">
        <app-brand-title size="large" />
      </div>
      <p class="tagline">Satna · Sign in to access your dashboard</p>
    </div>

    @if (isAuthenticated$ | async) {
      <p class="hint">You are signed in. <a routerLink="/dashboard">Go to dashboard</a></p>
    } @else {
      <div class="google-wrap">
        <div id="google-btn"></div>
      </div>
      <p class="fine-print">Sign in with your Google account. Session is stored on this device only.</p>
    }
  </div>
</div>
