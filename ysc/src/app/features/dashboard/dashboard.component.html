<div class="dashboard">
  <div class="club-brand">
    <app-club-logo size="lg" />
    <div class="club-brand__title">
      <app-brand-title size="medium" />
    </div>
  </div>

  @if (user$ | async; as user) {
    <section class="welcome">
      <div class="avatar-wrap">
        <img [src]="user.profileImageUrl" width="96" height="96" alt="" class="avatar" />
      </div>
      <h1 class="welcome-head">Welcome, {{ user.name }}</h1>
      <p class="email">{{ user.email }}</p>
      <p class="lead">
        You are signed in at our <strong>Satna</strong> location. Snooker session tracking and more will
        appear here in upcoming phases.
      </p>
    </section>
  }
</div>
