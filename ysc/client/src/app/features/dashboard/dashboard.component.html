<div class="dashboard">
  <div class="club-brand">
    <app-club-logo size="lg" />
    <div class="club-brand__title">
      <app-brand-title size="medium" />
    </div>
  </div>

  @if (user$ | async; as user) {
    <section class="welcome">
      <div class="avatar-wrap">
        <img [src]="user.profileImageUrl" width="96" height="96" alt="" class="avatar" />
      </div>
      <h1 class="welcome-head">Welcome, {{ user.name }}</h1>
      <p class="email">{{ user.email }}</p>

      @if (showPhoneInput) {
        <div class="phone-section">
          <h3>Add Your Phone Number</h3>
          <input type="text"
                 [(ngModel)]="phone"
                 (input)="onPhoneInput($event)"
                 placeholder="Enter 10 digit phone number"
                 maxlength="10"
                 class="phone-input"/>
          <button (click)="savePhone()" class="btn-save">
            Save Phone Number
          </button>
        </div>
      }

      @if (!showPhoneInput) {
        <div style="margin-top: 20px;">
          <button (click)="startFrame()" class="start-btn">
            🎱 Start Snooker Frame
          </button>
        </div>
      }

      <p class="lead">
        You are signed in at our <strong>Satna</strong> location. Snooker session tracking and more will
        appear here in upcoming phases. v2
      </p>
    </section>
  }
</div>
